<!DOCTYPE html>
<html>

<head>
    <style>
        .my-container {
            width: 300px;
            height: 400px;
            border: 2px solid red;
            position: fixed;
            bottom: 50px;
            right: 50px;
            overflow: hidden;
        }
    </style>
</head>

<body>
    <div class="my-container" id="myContainer"></div>
    <script type="application/javascript" src="https://ezchatbot.ai/webchat/index.umd.js" class="EzWebchat"
        id="9d9f88d5-c4f7-4c74-8227-7268269f1560.a13ceb21-c0d8-4120-8a82-3877385a5f9f"></script>
    <script>
        setTimeout(() => {
            const host = document.getElementById('preact-border-shadow-host');
            if (host) {
                document.getElementById('myContainer').appendChild(host);
                window.ezchat.open();
            }
        }, 4000);
    </script>
</body>

</html>
